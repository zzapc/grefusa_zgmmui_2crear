specVersion: "3.1"
metadata:
  name: es.seidor.grefusa.pedidoscompragrefusa-captacionpedidos2compra
type: application
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertError: false
        backend:
          - path: /sap
            url: http://ksapggddes.grefudom.local:8000/
            client: "100"
            destination: GREFUSA_DES
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://ui5.sap.com
          version: 1.44.12
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        component: es.seidor.grefusa.pedidoscompraGrefusa-CaptacionPedidos2Compra
        ui5Theme: sap_fiori_3
